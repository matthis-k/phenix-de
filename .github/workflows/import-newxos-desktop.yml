name: Import NewXOS desktop configuration

on:
  push:
    branches:
      - migration/newxos-desktop-config

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out Phenix DE
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Check out migration source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: matthis-k/newxos
          ref: 701edb5b3026ac8ea46440c12fcbeab598ee0e53
          path: .migration/newxos

      - name: Import desktop configuration data
        run: |
          set -euo pipefail

          rm -rf configs/phenix-shell configs/hypr configs/kitty
          mkdir -p configs patches

          cp -R .migration/newxos/configs/newshell configs/phenix-shell
          cp -R .migration/newxos/configs/hypr configs/hypr
          cp -R .migration/newxos/configs/kitty configs/kitty
          cp .migration/newxos/patches/hyprctl-fish-completions.patch patches/hyprctl-fish-completions.patch

          rm -rf .migration

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Update inputs
        run: nix flake update --accept-flake-config

      - name: Commit imported configuration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add configs patches flake.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore: import NewXOS desktop configuration"
            git push
          fi
