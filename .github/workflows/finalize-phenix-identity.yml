name: Finalize Phenix identity

on:
  push:
    branches:
      - rename/phenix-identity

permissions:
  contents: write

jobs:
  rename:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: rename/phenix-identity
          fetch-depth: 0
      - name: Rename shell and product identity
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')
          excluded = {Path('flake.lock'), Path('.github/workflows/finalize-phenix-identity.yml')}
          replacements = [
              ('NEWSHELL_', 'PHENIX_SHELL_'),
              ('NEWSHELL', 'PHENIX_SHELL'),
              ('newshell', 'phenix-shell'),
              ('Newxos', 'Phenix'),
              ('NEWXOS_', 'PHENIX_'),
              ('NEWXOS', 'PHENIX'),
              ('newxos', 'phenix'),
          ]

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path in excluded:
                  continue
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              updated = text
              for old, new in replacements:
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated)

          old_action = Path('configs/phenix-shell/launcher/backends/actions/NewxosActions.qml')
          new_action = Path('configs/phenix-shell/launcher/backends/actions/PhenixActions.qml')
          old_action.rename(new_action)

          action = new_action.read_text()
          action = action.replace('Open opencode in the repo', 'Open Pi in the Phenix workspace')
          action = action.replace('aliases: ["ai", "opencode"]', 'aliases: ["ai", "pi"]')
          action = action.replace('["phenix", "reload_shell"]', '["phenix", "reload-shell"]')
          new_action.write_text(action)

          package = Path('modules/package.nix')
          text = package.read_text().replace("''${PHENIX_DEV:-''${PHENIX_DEV:-0}}", "''${PHENIX_DEV:-0}")
          package.write_text(text)

          quickshell = Path('modules/home/quickshell.nix')
          text = quickshell.read_text().replace(
              '      ++ lib.optionals useDevConfig [\n        "PHENIX_DEV=1"\n        "PHENIX_DEV=1"\n      ];',
              '      ++ lib.optionals useDevConfig [ "PHENIX_DEV=1" ];',
          )
          quickshell.write_text(text)

          hyprland = Path('modules/nixos/hyprland-base.nix')
          text = hyprland.read_text()
          text = text.replace('mkdir -p /run/phenix/hypr /run/phenix/hypr', 'mkdir -p /run/phenix/hypr')
          text = text.replace('\n        ln -sfn /run/phenix/hypr/nix-import.lua /run/phenix/hypr/nix-import.lua', '')
          hyprland.write_text(text)

          interaction = Path('configs/phenix-shell/launcher/tests/run-launcher-interaction-ipc-tests.sh')
          text = interaction.read_text().replace('/tmp/phenix-phenix-shell-tests', '/tmp/phenix-shell-tests')
          interaction.write_text(text)
          PY
      - name: Commit rename
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: finalize Phenix shell identity"
          git push origin HEAD:rename/phenix-identity
